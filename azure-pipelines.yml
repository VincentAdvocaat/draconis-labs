trigger:
  - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
    displayName: Use Node.js 22

  - script: |
      corepack enable
      corepack prepare pnpm@11.10.0 --activate
      pnpm install --frozen-lockfile
      pnpm typecheck
      pnpm lint
      pnpm build
    displayName: Install, typecheck, lint and build
