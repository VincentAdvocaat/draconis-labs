trigger:
  branches:
    include:
      - main
pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
    displayName: Install Node.js

  - script: corepack enable && corepack pnpm install
    displayName: Install dependencies

  - script: corepack pnpm typecheck
    displayName: Typecheck

  - script: corepack pnpm lint
    displayName: Lint

  - script: corepack pnpm test
    displayName: Test

  - script: corepack pnpm build
    displayName: Build
